<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FamlyBudget — Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #EEF2F7;
      padding: 48px 24px 64px;
      color: #0F172A;
    }
    h1 {
      text-align: center;
      font-size: 26px;
      color: #1E3A8A;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #64748B;
      font-size: 14px;
      margin-bottom: 48px;
    }
    .section {
      max-width: 860px;
      margin: 0 auto 32px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: #94A3B8;
      margin-bottom: 12px;
    }
    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .preview-box {
      border-radius: 20px;
      padding: 48px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .on-white { background: #FFFFFF; border: 1px solid #E2E8F0; }
    .on-dark  { background: #0F172A; }
    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .wordmark {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 32px;
      line-height: 1;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }
    .sizes-box {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 28px 36px;
      display: flex;
      align-items: flex-end;
      gap: 40px;
    }
    .size-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .size-label {
      font-size: 11px;
      color: #94A3B8;
      font-weight: 600;
    }
    .icon-only-box {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 28px 36px;
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .icon-rounded {
      border-radius: 22%;
      overflow: hidden;
      display: inline-flex;
    }
  </style>
</head>
<body>

<h1>FamlyBudget — Logo</h1>
<p class="subtitle">Navy · Teal · Gold</p>

<!-- SVG symbol definition (hidden) — icona light -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="fb-icon-light" viewBox="0 0 100 100">
    <!-- $ sign background (navy) -->
    <text x="1" y="78"
          font-family="'Arial Black', Impact, sans-serif"
          font-size="66" font-weight="900"
          fill="#1E3A8A">$</text>

    <!-- Trend arrow (teal) — V-kink stile grafico azionario -->
    <polyline points="10,82 30,60 44,70 80,20"
              fill="none" stroke="#0D9488" stroke-width="5.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Punta freccia verso (80,20) dalla direzione (44,70)→(80,20) -->
    <polygon points="80,20 77,33 68,28" fill="#0D9488"/>

    <!-- Coin stack (oro) — cilindro destra -->
    <ellipse cx="81" cy="74" rx="12"  ry="4"   fill="#92400E"/>
    <rect    x="69"  y="54"  width="24" height="20" fill="#D97706"/>
    <ellipse cx="81" cy="54" rx="12"  ry="4"   fill="#FBBF24"/>
    <ellipse cx="81" cy="54" rx="7"   ry="2"   fill="#FDE68A" opacity="0.6"/>

    <!-- Figura femminile (teal) — dietro, destra -->
    <!-- Testa + capelli bob (path combinato: cupola + curve capelli) -->
    <path d="M 51,29 A 11,11 0 0 1 73,29 Q 76,41 62,45 Q 48,41 51,29 Z"
          fill="#0D9488"/>
    <!-- Corpo femminile -->
    <path d="M48,78 Q48,54 62,50 Q76,54 76,78 Z" fill="#0D9488"/>

    <!-- Figura maschile (navy) — davanti, sinistra -->
    <!-- Corpo -->
    <path d="M24,74 Q26,48 38,44 Q50,48 52,74 Z" fill="#1E3A8A"/>
    <!-- Testa -->
    <circle cx="38" cy="22" r="12" fill="#1E3A8A"/>

    <!-- Moneta oro piccola (in evidenza, sopra le figure) -->
    <circle cx="54" cy="63" r="8"   fill="#D97706"/>
    <circle cx="54" cy="63" r="5"   fill="#FBBF24" opacity="0.7"/>
  </symbol>

  <!-- Icona dark (colori più chiari per sfondo scuro) -->
  <symbol id="fb-icon-dark" viewBox="0 0 100 100">
    <text x="1" y="78"
          font-family="'Arial Black', Impact, sans-serif"
          font-size="66" font-weight="900"
          fill="#3B82F6">$</text>
    <polyline points="10,82 30,60 44,70 80,20"
              fill="none" stroke="#2DD4BF" stroke-width="5.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="80,20 77,33 68,28" fill="#2DD4BF"/>
    <ellipse cx="81" cy="74" rx="12"  ry="4"   fill="#78350F"/>
    <rect    x="69"  y="54"  width="24" height="20" fill="#F59E0B"/>
    <ellipse cx="81" cy="54" rx="12"  ry="4"   fill="#FCD34D"/>
    <ellipse cx="81" cy="54" rx="7"   ry="2"   fill="#FEF3C7" opacity="0.7"/>
    <path d="M 51,29 A 11,11 0 0 1 73,29 Q 76,41 62,45 Q 48,41 51,29 Z"
          fill="#2DD4BF"/>
    <path d="M48,78 Q48,54 62,50 Q76,54 76,78 Z" fill="#2DD4BF"/>
    <path d="M24,74 Q26,48 38,44 Q50,48 52,74 Z" fill="#60A5FA"/>
    <circle cx="38" cy="22" r="12" fill="#60A5FA"/>
    <circle cx="54" cy="63" r="8"  fill="#F59E0B"/>
    <circle cx="54" cy="63" r="5"  fill="#FCD34D" opacity="0.7"/>
  </symbol>

  <!-- Icona app icon (sfondo navy, elementi chiari) -->
  <symbol id="fb-icon-appicon" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#1E3A8A"/>
    <text x="1" y="78"
          font-family="'Arial Black', Impact, sans-serif"
          font-size="66" font-weight="900"
          fill="#FFFFFF" opacity="0.12">$</text>
    <polyline points="10,82 30,60 44,70 80,20"
              fill="none" stroke="#2DD4BF" stroke-width="5.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="80,20 77,33 68,28" fill="#2DD4BF"/>
    <ellipse cx="81" cy="74" rx="12"  ry="4"   fill="#78350F"/>
    <rect    x="69"  y="54"  width="24" height="20" fill="#F59E0B"/>
    <ellipse cx="81" cy="54" rx="12"  ry="4"   fill="#FCD34D"/>
    <ellipse cx="81" cy="54" rx="7"   ry="2"   fill="#FEF3C7" opacity="0.7"/>
    <path d="M 51,29 A 11,11 0 0 1 73,29 Q 76,41 62,45 Q 48,41 51,29 Z"
          fill="#2DD4BF"/>
    <path d="M48,78 Q48,54 62,50 Q76,54 76,78 Z" fill="#2DD4BF"/>
    <path d="M24,74 Q26,48 38,44 Q50,48 52,74 Z" fill="#FFFFFF"/>
    <circle cx="38" cy="22" r="12" fill="#FFFFFF"/>
    <circle cx="54" cy="63" r="8"  fill="#F59E0B"/>
    <circle cx="54" cy="63" r="5"  fill="#FCD34D" opacity="0.7"/>
  </symbol>
</svg>

<!-- ─── LOGO COMPLETO: SFONDO CHIARO + SCURO ─── -->
<div class="section">
  <div class="section-label">Logo completo</div>
  <div class="preview-grid">

    <div class="preview-box on-white">
      <div class="logo-lockup">
        <svg width="80" height="80"><use href="#fb-icon-light"/></svg>
        <div class="wordmark">
          <span style="color:#1E3A8A">Faml</span><span style="color:#0D9488">y</span><span style="color:#D97706">Budget</span>
        </div>
      </div>
    </div>

    <div class="preview-box on-dark">
      <div class="logo-lockup">
        <svg width="80" height="80"><use href="#fb-icon-dark"/></svg>
        <div class="wordmark">
          <span style="color:#F8FAFC">Faml</span><span style="color:#2DD4BF">y</span><span style="color:#FCD34D">Budget</span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ─── ICONA — DIMENSIONI ─── -->
<div class="section">
  <div class="section-label">Icona — dimensioni</div>
  <div class="sizes-box">

    <div class="size-item">
      <svg width="96" height="96"><use href="#fb-icon-light"/></svg>
      <span class="size-label">96px</span>
    </div>
    <div class="size-item">
      <svg width="64" height="64"><use href="#fb-icon-light"/></svg>
      <span class="size-label">64px</span>
    </div>
    <div class="size-item">
      <svg width="48" height="48"><use href="#fb-icon-light"/></svg>
      <span class="size-label">48px</span>
    </div>
    <div class="size-item">
      <svg width="32" height="32"><use href="#fb-icon-light"/></svg>
      <span class="size-label">32px</span>
    </div>
    <div class="size-item">
      <svg width="20" height="20"><use href="#fb-icon-light"/></svg>
      <span class="size-label">20px</span>
    </div>

  </div>
</div>

<!-- ─── ICONA APP — SFONDO NAVY ─── -->
<div class="section">
  <div class="section-label">App icon — sfondo navy (Google Play / App Store)</div>
  <div class="icon-only-box">

    <div class="size-item">
      <div class="icon-rounded" style="width:96px;height:96px;">
        <svg width="96" height="96"><use href="#fb-icon-appicon"/></svg>
      </div>
      <span class="size-label">96px</span>
    </div>
    <div class="size-item">
      <div class="icon-rounded" style="width:72px;height:72px;">
        <svg width="72" height="72"><use href="#fb-icon-appicon"/></svg>
      </div>
      <span class="size-label">72px</span>
    </div>
    <div class="size-item">
      <div class="icon-rounded" style="width:48px;height:48px;">
        <svg width="48" height="48"><use href="#fb-icon-appicon"/></svg>
      </div>
      <span class="size-label">48px</span>
    </div>
    <div class="size-item">
      <div class="icon-rounded" style="width:32px;height:32px;">
        <svg width="32" height="32"><use href="#fb-icon-appicon"/></svg>
      </div>
      <span class="size-label">32px</span>
    </div>

    <div style="margin-left:auto; border-left:1px solid #E2E8F0; padding-left:32px;">
      <p style="font-size:12px; color:#64748B; margin-bottom:12px; font-weight:600;">Preview su sfondo chiaro</p>
      <div style="background:#F8FAFC; border-radius:12px; padding:16px; display:inline-block;">
        <div class="icon-rounded" style="width:72px;height:72px;">
          <svg width="72" height="72"><use href="#fb-icon-appicon"/></svg>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ─── SOLO WORDMARK ─── -->
<div class="section">
  <div class="section-label">Wordmark — solo testo</div>
  <div class="preview-grid">

    <div class="preview-box on-white" style="padding:32px;">
      <div class="wordmark" style="font-size:38px;">
        <span style="color:#1E3A8A">Faml</span><span style="color:#0D9488">y</span><span style="color:#D97706">Budget</span>
      </div>
    </div>

    <div class="preview-box on-dark" style="padding:32px;">
      <div class="wordmark" style="font-size:38px;">
        <span style="color:#F8FAFC">Faml</span><span style="color:#2DD4BF">y</span><span style="color:#FCD34D">Budget</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
